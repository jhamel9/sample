<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ppt3d | Lumina Studio Viewer</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #09090b;
            color: #f8fafc;
            font-family: "Segoe UI", sans-serif;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -18%;
            pointer-events: none;
        }

        body::before {
            z-index: 0;
            background:
                radial-gradient(circle at 20% 24%, rgba(63, 115, 255, 0.22), transparent 30%),
                radial-gradient(circle at 78% 18%, rgba(255, 173, 84, 0.18), transparent 26%),
                radial-gradient(circle at 52% 78%, rgba(49, 195, 255, 0.12), transparent 34%);
            filter: blur(56px);
            opacity: 0.95;
        }

        body::after {
            z-index: 0;
            background:
                radial-gradient(circle at center, transparent 38%, rgba(5, 7, 14, 0.54) 100%),
                linear-gradient(180deg, rgba(4, 8, 18, 0.12), rgba(2, 4, 9, 0.88));
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay-panel {
            position: fixed;
            left: 16px;
            bottom: 16px;
            z-index: 10;
            max-width: min(520px, calc(100vw - 32px));
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(248, 250, 252, 0.14);
            background: rgba(9, 9, 11, 0.84);
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
            font-size: 13px;
            line-height: 1.5;
        }

        #scene-status[data-tone="error"] {
            border-color: rgba(248, 113, 113, 0.34);
        }

        .screen-focus-button {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 11;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 999px;
            background: rgba(9, 12, 20, 0.78);
            color: #e2f2ff;
            font: inherit;
            font-size: 13px;
            letter-spacing: 0.02em;
            backdrop-filter: blur(14px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
            cursor: pointer;
            transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
        }

        .screen-focus-button:hover:not(:disabled) {
            background: rgba(18, 28, 44, 0.9);
            border-color: rgba(125, 211, 252, 0.4);
            transform: translateY(-1px);
        }

        .screen-focus-button:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .screen-reset-button {
            top: 64px;
            background: rgba(10, 14, 24, 0.72);
            color: rgba(226, 242, 255, 0.92);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
</head>
<body>
    <div id="app"></div>
    <div id="scene-status" class="overlay-panel" hidden></div>
    <button id="screen-focus-button" class="screen-focus-button" type="button" hidden>Zoom Screen</button>
    <button id="screen-reset-button" class="screen-focus-button screen-reset-button" type="button" hidden>Back to Overview</button>
    <script src="scene.js"></script>
</body>
</html>
